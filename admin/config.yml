backend:
  name: git-gateway
  branch: main

media_folder: "slike/upload"
public_folder: "/slike/upload"

locale: 'sr'

collections:

  # ── VIJESTI ──────────────────────────────────────────
  - name: "vijesti"
    label: "Vijesti"
    folder: "_vijesti"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Naslov (SR)", name: "naslov_sr", widget: "string" }
      - { label: "Naslov (EN)", name: "naslov_en", widget: "string" }
      - { label: "Datum", name: "datum", widget: "datetime", format: "DD. MM. YYYY.", date_format: "DD. MM. YYYY.", time_format: false }
      - { label: "Tekst (SR)", name: "tekst_sr", widget: "text" }
      - { label: "Tekst (EN)", name: "tekst_en", widget: "text" }
      - { label: "Glavna fotografija", name: "foto_glavna", widget: "image", required: false }
      - { label: "Fotografija 2", name: "foto2", widget: "image", required: false }
      - { label: "Fotografija 3", name: "foto3", widget: "image", required: false }
      - { label: "Objavi", name: "published", widget: "boolean", default: true }

  # ── PROJEKTI ─────────────────────────────────────────
  - name: "projekti"
    label: "Projekti"
    folder: "_projekti"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Naziv (SR)", name: "naziv_sr", widget: "string" }
      - { label: "Naziv (EN)", name: "naziv_en", widget: "string" }
      - { label: "Opis (SR)", name: "opis_sr", widget: "text" }
      - { label: "Opis (EN)", name: "opis_en", widget: "text" }
      - { label: "Kategorija (SR)", name: "kategorija_sr", widget: "string", hint: "npr. Humanitarno, Obrazovanje, Zdravlje..." }
      - { label: "Kategorija (EN)", name: "kategorija_en", widget: "string" }
      - { label: "Redni broj", name: "redni_broj", widget: "number", value_type: "int", hint: "Redosljed prikaza na sajtu" }
      - { label: "Objavi", name: "published", widget: "boolean", default: true }

  # ── NAGRADA BOCARIĆ ───────────────────────────────────
  - name: "nagrade"
    label: "Nagrada Bocarić"
    folder: "_nagrade"
    create: true
    slug: "{{fields.godina}}"
    fields:
      - { label: "Godina", name: "godina", widget: "number", value_type: "int" }
      - { label: "Ime i prezime dobitnika", name: "ime", widget: "string" }
      - { label: "Zvanje / titula (SR)", name: "zvanje_sr", widget: "string" }
      - { label: "Zvanje / titula (EN)", name: "zvanje_en", widget: "string" }
      - { label: "Biografija (SR)", name: "bio_sr", widget: "text" }
      - { label: "Biografija (EN)", name: "bio_en", widget: "text" }
      - { label: "Fotografija", name: "foto", widget: "image", required: false }
      - { label: "Objavi", name: "published", widget: "boolean", default: true }

  # ── ČLANOVI ──────────────────────────────────────────
  - name: "clanovi"
    label: "Članovi"
    folder: "_clanovi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Ime i prezime", name: "ime", widget: "string" }
      - { label: "Kategorija", name: "kategorija", widget: "select", options: ["Uprava", "Aktivni član", "Počasni član"] }
      - { label: "Funkcija (SR)", name: "funkcija_sr", widget: "string", required: false, hint: "npr. Predsjednik, Sekretar..." }
      - { label: "Funkcija (EN)", name: "funkcija_en", widget: "string", required: false }
      - { label: "Zanimanje / firma", name: "zanimanje", widget: "string", required: false }
      - { label: "Fotografija", name: "foto", widget: "image", required: false }
      - { label: "Član od godine", name: "clan_od", widget: "number", value_type: "int", required: false }
      - { label: "Redni broj (za sortiranje)", name: "redni_broj", widget: "number", value_type: "int", default: 99 }
      - { label: "Objavi", name: "published", widget: "boolean", default: true }
