Idi u GitHub → admin/config.yml → klikni olovku (Edit) → obriši sve i zalijepi ovaj kompletni sadržaj:
yamlbackend:
  name: git-gateway
  branch: main

media_folder: "slike"
public_folder: "/slike"

locale: "sr"

collections:
  - name: "vijesti"
    label: "Vijesti"
    label_singular: "Vijest"
    folder: "content/vijesti"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Naslov (SR)", name: "naslov_sr", widget: "string" }
      - { label: "Naslov (EN)", name: "naslov_en", widget: "string" }
      - { label: "Datum", name: "datum", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Emoji ikona", name: "ikona", widget: "string", default: "📰" }
      - { label: "Kratki opis (SR)", name: "opis_sr", widget: "text" }
      - { label: "Kratki opis (EN)", name: "opis_en", widget: "text" }

  - name: "clanovi"
    label: "Članovi"
    label_singular: "Član"
    folder: "content/clanovi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Ime i prezime", name: "ime", widget: "string" }
      - { label: "Uloga (SR)", name: "uloga_sr", widget: "string" }
      - { label: "Uloga (EN)", name: "uloga_en", widget: "string" }
      - { label: "Inicijali", name: "inicijali", widget: "string" }
      - { label: "Biografija (SR)", name: "bio_sr", widget: "text" }
      - { label: "Biografija (EN)", name: "bio_en", widget: "text" }
      - { label: "Član od (godina)", name: "clan_od", widget: "number" }
      - { label: "Redoslijed", name: "redoslijed", widget: "number", default: 99 }
      - { label: "Fotografija", name: "fotografija", widget: "image", required: false }

  - name: "projekti"
    label: "Projekti"
    label_singular: "Projekat"
    folder: "content/projekti"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Naziv (SR)", name: "naziv_sr", widget: "string" }
      - { label: "Naziv (EN)", name: "naziv_en", widget: "string" }
      - { label: "Opis (SR)", name: "opis_sr", widget: "text" }
      - { label: "Opis (EN)", name: "opis_en", widget: "text" }
